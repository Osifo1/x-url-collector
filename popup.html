<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>X Tweet URL Collector</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      min-height: 200px;
      background-color: #0f1419;
      color: #e7e9ea;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2f3336;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #1d9bf0;
    }

    .header span {
      font-size: 12px;
      color: #71767b;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary {
      background-color: #1d9bf0;
      color: white;
      margin-bottom: 10px;
    }

    .btn-primary:hover {
      background-color: #1a8cd8;
    }

    .btn-primary:disabled {
      background-color: #2f3336;
      color: #71767b;
      cursor: not-allowed;
    }

    .btn-copy {
      background-color: #2f3336;
      color: #e7e9ea;
      margin-bottom: 8px;
    }

    .btn-copy:hover {
      background-color: #3f4446;
    }

    .btn-success {
      background-color: #00ba7c;
      color: white;
    }

    .status {
      font-size: 13px;
      color: #71767b;
      text-align: center;
      margin-bottom: 12px;
      min-height: 20px;
    }

    .status.error {
      color: #f4212e;
    }

    .status.success {
      color: #00ba7c;
    }

    .count-badge {
      display: inline-block;
      background-color: #1d9bf0;
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 6px;
    }

    .url-list {
      background-color: #16181c;
      border: 1px solid #2f3336;
      border-radius: 8px;
      max-height: 250px;
      overflow-y: auto;
      margin-bottom: 10px;
      padding: 8px;
    }

    .url-item {
      font-size: 11px;
      color: #71767b;
      padding: 4px 0;
      border-bottom: 1px solid #2f3336;
      word-break: break-all;
    }

    .url-item:last-child {
      border-bottom: none;
    }

    .url-item:hover {
      color: #1d9bf0;
    }

    .footer {
      font-size: 11px;
      color: #71767b;
      text-align: center;
      margin-top: 8px;
    }

    .footer a {
      color: #1d9bf0;
      text-decoration: none;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🐦 X URL Collector</h1>
    <span>for X Profile Analyzer</span>
  </div>

  <div id="status" class="status">
    Open an X profile page then click Collect
  </div>

  <button id="collectBtn" class="btn btn-primary">
    Collect Tweet URLs
  </button>

  <div id="results" class="hidden">
    <div id="urlList" class="url-list"></div>
    <button id="copyBtn" class="btn btn-copy">
      📋 Copy All URLs <span id="countBadge" class="count-badge">0</span>
    </button>
    <button id="copyAnalyzerBtn" class="btn btn-copy">
      🔗 Open X Analyzer with URLs
    </button>
  </div>

  <div class="footer">
    Paste copied URLs into <a href="#" id="analyzerLink">X Profile Analyzer</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
